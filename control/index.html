<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Draggable Dress-up with Snapping</title>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="return">
      <div class="draggable hat"></div>
      <div class="draggable pants"></div>
      <div class="draggable shirt"></div>
    </div>

    <div class="avatar">
      <div class="draggable hat"></div>
      <div class="draggable shirt"></div>
      <div class="draggable pants"></div>
    </div>

    <script src="jquery-3.7.1.min.js"></script>
    <script src="jquery-ui.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
